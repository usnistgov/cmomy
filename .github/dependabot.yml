version: 2

updates:
  - package-ecosystem: github-actions
    directories:
      - "/"
      - ".github/actions/setup-cached-uv-and-python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    allow:
      - dependency-type: all
    ignore:
      # ignore 1.x update (need these for version numpy1
      - dependency-name: numpy
        update-types: ["version-update:semver-major"]
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"
